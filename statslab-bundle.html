<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StatsLab — Interactive Statistics</title>
  <style>
/* ─── StatsLab Design System ────────────────────────────────────────────────
   Aesthetic: Precision-industrial. Dark-first. Editorial type.
   Font pairing: DM Mono (display labels) + Source Serif 4 (body/explain)
   ─────────────────────────────────────────────────────────────────────────── */

@import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,400&family=Syne:wght@400;600;700;800&display=swap');

/* ─── Tokens ─────────────────────────────────────────────────────────────── */
:root {
  --bg-page:        #0e0f11;
  --bg-surface:     #141518;
  --bg-raised:      #1c1d21;
  --bg-hover:       #22232a;
  --bg-active:      #292b33;

  --border-subtle:  rgba(255,255,255,0.06);
  --border-default: rgba(255,255,255,0.11);
  --border-strong:  rgba(255,255,255,0.20);

  --text-primary:   #f0eff4;
  --text-secondary: #9b9aab;
  --text-muted:     #58576a;
  --text-inverse:   #0e0f11;

  --accent-blue:    #4a7cff;
  --accent-teal:    #1dcf9e;
  --accent-coral:   #ff6b6b;
  --accent-amber:   #ffca3a;
  --accent-purple:  #9b72ff;
  --accent-warn:    #f0a500;

  --accent-blue-dim:   rgba(74,124,255,0.15);
  --accent-teal-dim:   rgba(29,207,158,0.12);
  --accent-coral-dim:  rgba(255,107,107,0.12);

  --font-display: 'Syne', sans-serif;
  --font-mono:    'DM Mono', monospace;
  --font-serif:   'Source Serif 4', serif;

  --radius-sm:  4px;
  --radius-md:  8px;
  --radius-lg:  12px;
  --radius-xl:  16px;

  --sidebar-w:  220px;
  --panel-w:    280px;
  --header-h:   52px;

  --transition: 180ms cubic-bezier(0.4,0,0.2,1);
}

/* Light mode override */
[data-theme="light"] {
  --bg-page:        #f4f3f8;
  --bg-surface:     #ffffff;
  --bg-raised:      #f9f8fc;
  --bg-hover:       #f1f0f6;
  --bg-active:      #e8e7ef;

  --border-subtle:  rgba(0,0,0,0.05);
  --border-default: rgba(0,0,0,0.10);
  --border-strong:  rgba(0,0,0,0.18);

  --text-primary:   #1a1928;
  --text-secondary: #6b6a82;
  --text-muted:     #aeacc0;
  --text-inverse:   #f4f3f8;

  --accent-blue-dim:   rgba(74,124,255,0.10);
  --accent-teal-dim:   rgba(29,207,158,0.09);
  --accent-coral-dim:  rgba(255,107,107,0.09);
}

/* ─── Reset ──────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-serif);
  background: var(--bg-page);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  display: grid;
  grid-template-rows: var(--header-h) 1fr;
  grid-template-columns: var(--sidebar-w) 1fr var(--panel-w);
  grid-template-areas:
    "header header header"
    "sidebar main   panel";
}

/* ─── Header ─────────────────────────────────────────────────────────────── */
#app-header {
  grid-area: header;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 20px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-subtle);
  z-index: 40;
}

.header-logo {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 1.15rem;
  letter-spacing: -0.02em;
  color: var(--text-primary);
  flex-shrink: 0;
}
.header-logo span { color: var(--accent-blue); }

.header-search {
  flex: 1;
  max-width: 320px;
  position: relative;
}
.header-search input {
  width: 100%;
  background: var(--bg-raised);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 6px 12px 6px 32px;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 0.8rem;
  outline: none;
  transition: border-color var(--transition);
}
.header-search input:focus { border-color: var(--accent-blue); }
.header-search input::placeholder { color: var(--text-muted); }
.header-search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px; opacity: 0.4;
  pointer-events: none;
}

.header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

.btn-theme {
  background: var(--bg-raised);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  color: var(--text-secondary);
  padding: 5px 11px;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  cursor: pointer;
  transition: all var(--transition);
}
.btn-theme:hover { color: var(--text-primary); border-color: var(--border-default); }

.header-tag {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-muted);
  background: var(--bg-raised);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  padding: 3px 8px;
}

/* ─── Sidebar ─────────────────────────────────────────────────────────────── */
#sidebar {
  grid-area: sidebar;
  background: var(--bg-surface);
  border-right: 1px solid var(--border-subtle);
  overflow-y: auto;
  padding: 12px 0 24px;
  scrollbar-width: thin;
  scrollbar-color: var(--border-default) transparent;
}

.sidebar-cat {
  padding: 14px 16px 4px;
  font-family: var(--font-display);
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: all var(--transition);
  text-decoration: none;
}
.nav-item:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}
.nav-item.active {
  background: var(--accent-blue-dim);
  border-left-color: var(--accent-blue);
  color: var(--accent-blue);
}
.nav-icon {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  font-style: italic;
  color: var(--text-muted);
  width: 26px;
  text-align: center;
  flex-shrink: 0;
  transition: color var(--transition);
}
.nav-item.active .nav-icon { color: var(--accent-blue); }
.nav-label {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  line-height: 1.3;
  color: inherit;
}

/* ─── Main canvas area ───────────────────────────────────────────────────── */
#main {
  grid-area: main;
  overflow-y: auto;
  padding: 24px;
  scrollbar-width: thin;
  scrollbar-color: var(--border-default) transparent;
}

.topic-header {
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border-subtle);
}
.topic-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.5rem;
  letter-spacing: -0.03em;
  margin-bottom: 4px;
}
.topic-insight {
  font-family: var(--font-serif);
  font-size: 0.88rem;
  color: var(--text-secondary);
  font-style: italic;
  line-height: 1.5;
}
.topic-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
  flex-wrap: wrap;
}
.meta-chip {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  padding: 3px 8px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-subtle);
  color: var(--text-muted);
  background: var(--bg-raised);
}
.meta-chip.cat-descriptive { border-color: var(--accent-amber); color: var(--accent-amber); }
.meta-chip.cat-inference   { border-color: var(--accent-teal);  color: var(--accent-teal);  }
.meta-chip.cat-hypothesis  { border-color: var(--accent-blue);  color: var(--accent-blue);  }
.meta-chip.cat-ml          { border-color: var(--accent-purple);color: var(--accent-purple);}

/* chart container */
#chart-area {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 20px;
  min-height: 400px;
  animation: fadeIn 240ms ease;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

/* loading state */
.chart-loading {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  min-height: 400px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 0.8rem;
}
.spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--border-subtle);
  border-top-color: var(--accent-blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Right panel ────────────────────────────────────────────────────────── */
#panel {
  grid-area: panel;
  background: var(--bg-surface);
  border-left: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-tabs {
  display: flex;
  border-bottom: 1px solid var(--border-subtle);
  flex-shrink: 0;
}
.panel-tab {
  flex: 1;
  padding: 10px 0;
  text-align: center;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all var(--transition);
}
.panel-tab:hover { color: var(--text-primary); }
.panel-tab.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); }

.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  scrollbar-width: thin;
  scrollbar-color: var(--border-default) transparent;
}
.panel-section { display: none; }
.panel-section.visible { display: block; }

/* ─── Controls ───────────────────────────────────────────────────────────── */
.control-group { margin-bottom: 18px; }

.control-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-secondary);
}
.control-value {
  color: var(--accent-blue);
  font-weight: 500;
}

.ctrl-slider {
  width: 100%;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  border-radius: 2px;
  background: var(--bg-active);
  outline: none;
  cursor: pointer;
}
.ctrl-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--accent-blue);
  border: 2px solid var(--bg-surface);
  cursor: pointer;
  transition: transform var(--transition);
}
.ctrl-slider::-webkit-slider-thumb:hover { transform: scale(1.25); }
.ctrl-slider::-moz-range-thumb {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--accent-blue);
  border: 2px solid var(--bg-surface);
  cursor: pointer;
}

.ctrl-select {
  width: 100%;
  background: var(--bg-raised);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 0.78rem;
  padding: 7px 10px;
  outline: none;
  cursor: pointer;
  transition: border-color var(--transition);
}
.ctrl-select:focus { border-color: var(--accent-blue); }

.ctrl-toggle-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}
.ctrl-toggle-input { display: none; }
.ctrl-toggle-track {
  position: relative;
  width: 34px; height: 18px;
  background: var(--bg-active);
  border-radius: 9px;
  transition: background var(--transition);
  flex-shrink: 0;
}
.ctrl-toggle-input:checked + .ctrl-toggle-track {
  background: var(--accent-blue);
}
.ctrl-toggle-thumb {
  position: absolute;
  top: 2px; left: 2px;
  width: 14px; height: 14px;
  background: var(--text-primary);
  border-radius: 50%;
  transition: transform var(--transition);
}
.ctrl-toggle-input:checked + .ctrl-toggle-track .ctrl-toggle-thumb {
  transform: translateX(16px);
}
.ctrl-toggle-label {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-secondary);
}

.ctrl-radio-group {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.ctrl-radio-btn {
  padding: 4px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-default);
  background: var(--bg-raised);
  color: var(--text-secondary);
  font-family: var(--font-mono);
  font-size: 0.72rem;
  cursor: pointer;
  transition: all var(--transition);
}
.ctrl-radio-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
.ctrl-radio-btn.active {
  background: var(--accent-blue-dim);
  border-color: var(--accent-blue);
  color: var(--accent-blue);
}

/* dataset badge in controls */
.dataset-badge {
  margin-top: 20px;
  padding: 10px 12px;
  background: var(--bg-raised);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  border-left: 3px solid var(--accent-teal);
}
.dataset-badge-title {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent-teal);
  margin-bottom: 3px;
}
.dataset-badge-name {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-secondary);
}

/* ─── Explain panel ──────────────────────────────────────────────────────── */
.explain-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--bg-raised);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.stat-val {
  font-family: var(--font-mono);
  font-size: 1.05rem;
  font-weight: 500;
  color: var(--text-primary);
  line-height: 1;
}
.stat-val.sig    { color: var(--accent-teal); }
.stat-val.nonsig { color: var(--accent-coral); }
.stat-lbl {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.explain-text {
  font-family: var(--font-serif);
  font-size: 0.85rem;
  line-height: 1.7;
  color: var(--text-secondary);
  margin-bottom: 10px;
}
.explain-text strong { color: var(--text-primary); font-weight: 600; }
.explain-text em     { color: var(--accent-amber); font-style: italic; }

/* ─── Empty / welcome state ──────────────────────────────────────────────── */
#welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  min-height: 480px;
  gap: 16px;
  padding: 40px;
}
.welcome-logo {
  font-family: var(--font-display);
  font-size: 3rem;
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 1;
  color: var(--text-primary);
}
.welcome-logo span { color: var(--accent-blue); }
.welcome-sub {
  font-family: var(--font-serif);
  font-size: 1rem;
  color: var(--text-secondary);
  max-width: 420px;
  line-height: 1.6;
  font-style: italic;
}
.welcome-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  width: 100%;
  max-width: 600px;
  margin-top: 8px;
}
.welcome-card {
  background: var(--bg-raised);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 12px 8px;
  cursor: pointer;
  transition: all var(--transition);
  text-align: center;
}
.welcome-card:hover {
  background: var(--bg-hover);
  border-color: var(--accent-blue);
  transform: translateY(-2px);
}
.welcome-card-icon {
  font-family: var(--font-mono);
  font-style: italic;
  font-size: 0.85rem;
  color: var(--accent-blue);
  margin-bottom: 5px;
}
.welcome-card-title {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text-muted);
  line-height: 1.3;
}

/* ─── Search results ─────────────────────────────────────────────────────── */
#search-results {
  position: absolute;
  top: calc(var(--header-h) - 2px);
  left: 236px;
  width: 320px;
  background: var(--bg-raised);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  z-index: 100;
  overflow: hidden;
  display: none;
}
#search-results.visible { display: block; }
.search-result-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  cursor: pointer;
  border-bottom: 1px solid var(--border-subtle);
  transition: background var(--transition);
}
.search-result-item:last-child { border-bottom: none; }
.search-result-item:hover { background: var(--bg-hover); }
.sr-icon { font-family: var(--font-mono); font-size: 0.7rem; font-style: italic; color: var(--accent-blue); width: 24px; }
.sr-title { font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-primary); }
.sr-dataset { font-family: var(--font-mono); font-size: 0.68rem; color: var(--text-muted); }

/* ─── Scrollbars ─────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

/* ─── Chart.js global overrides ──────────────────────────────────────────── */
canvas { display: block; }

<script>
// ── ENGINE ──────────────────────────────────────────────
// ─── StatsLab Engine ────────────────────────────────────────────────────────
// Shared statistical functions + chart factory
// All modules import from here — never reimplement math in a module

const Stats = {
  mean(arr) {
    if (!arr.length) return 0;
    return arr.reduce((s, v) => s + v, 0) / arr.length;
  },
  median(arr) {
    if (!arr.length) return 0;
    const s = [...arr].sort((a, b) => a - b);
    const m = Math.floor(s.length / 2);
    return s.length % 2 ? s[m] : (s[m - 1] + s[m]) / 2;
  },
  variance(arr, population = false) {
    if (arr.length < 2) return 0;
    const m = Stats.mean(arr);
    const sq = arr.map(v => (v - m) ** 2);
    return Stats.mean(sq) * (population ? 1 : arr.length / (arr.length - 1));
  },
  std(arr, population = false) {
    return Math.sqrt(Stats.variance(arr, population));
  },
  // Two-sample independent t-test, returns {t, df, p}
  tTest(a, b) {
    const n1 = a.length, n2 = b.length;
    const m1 = Stats.mean(a), m2 = Stats.mean(b);
    const s1 = Stats.variance(a), s2 = Stats.variance(b);
    const se = Math.sqrt(s1 / n1 + s2 / n2);
    if (se === 0) return { t: 0, df: n1 + n2 - 2, p: 1 };
    const t = (m1 - m2) / se;
    // Welch–Satterthwaite df
    const df = (s1 / n1 + s2 / n2) ** 2 /
      ((s1 / n1) ** 2 / (n1 - 1) + (s2 / n2) ** 2 / (n2 - 1));
    const p = 2 * Stats.tCDF(-Math.abs(t), df);
    return { t, df, p };
  },
  // Paired t-test
  pairedTTest(before, after) {
    const diffs = before.map((v, i) => after[i] - v);
    const m = Stats.mean(diffs);
    const s = Stats.std(diffs);
    const n = diffs.length;
    const t = m / (s / Math.sqrt(n));
    const df = n - 1;
    const p = 2 * Stats.tCDF(-Math.abs(t), df);
    return { t, df, p, diffs, meanDiff: m, sdDiff: s };
  },
  // F-test for equality of variances
  fTest(a, b) {
    const va = Stats.variance(a), vb = Stats.variance(b);
    const F = va > vb ? va / vb : vb / va;
    const df1 = (va > vb ? a : b).length - 1;
    const df2 = (va > vb ? b : a).length - 1;
    const p = 2 * Math.min(Stats.fCDF(F, df1, df2), 1 - Stats.fCDF(F, df1, df2));
    return { F, df1, df2, p, var1: va, var2: vb };
  },
  // One-way ANOVA
  anova(groups) {
    const allVals = groups.flat();
    const grandMean = Stats.mean(allVals);
    const N = allVals.length;
    const k = groups.length;
    const SSB = groups.reduce((s, g) => s + g.length * (Stats.mean(g) - grandMean) ** 2, 0);
    const SSW = groups.reduce((s, g) => {
      const m = Stats.mean(g);
      return s + g.reduce((ss, v) => ss + (v - m) ** 2, 0);
    }, 0);
    const dfB = k - 1, dfW = N - k;
    const MSB = SSB / dfB, MSW = SSW / dfW;
    const F = MSW > 0 ? MSB / MSW : 0;
    const p = 1 - Stats.fCDF(F, dfB, dfW);
    return { F, dfB, dfW, MSB, MSW, SSB, SSW, p };
  },
  // Chi-square test of independence
  chiSquare(table) {
    const rows = table.length, cols = table[0].length;
    const rowSums = table.map(r => r.reduce((s, v) => s + v, 0));
    const colSums = Array.from({ length: cols }, (_, j) => table.reduce((s, r) => s + r[j], 0));
    const N = rowSums.reduce((s, v) => s + v, 0);
    let chi2 = 0;
    const expected = [];
    for (let i = 0; i < rows; i++) {
      expected[i] = [];
      for (let j = 0; j < cols; j++) {
        const e = (rowSums[i] * colSums[j]) / N;
        expected[i][j] = e;
        if (e > 0) chi2 += (table[i][j] - e) ** 2 / e;
      }
    }
    const df = (rows - 1) * (cols - 1);
    const p = 1 - Stats.chi2CDF(chi2, df);
    return { chi2, df, p, expected, rowSums, colSums, N };
  },
  // Pearson correlation + p-value
  correlation(x, y) {
    const n = x.length;
    const mx = Stats.mean(x), my = Stats.mean(y);
    const num = x.reduce((s, xi, i) => s + (xi - mx) * (y[i] - my), 0);
    const den = Math.sqrt(
      x.reduce((s, xi) => s + (xi - mx) ** 2, 0) *
      y.reduce((s, yi) => s + (yi - my) ** 2, 0)
    );
    const r = den > 0 ? num / den : 0;
    const t = r * Math.sqrt((n - 2) / (1 - r * r + 1e-10));
    const p = 2 * Stats.tCDF(-Math.abs(t), n - 2);
    return { r, t, p };
  },
  // Histogram bins (Sturges / fixed count)
  histogram(arr, bins = 20) {
    const min = Math.min(...arr), max = Math.max(...arr);
    const width = (max - min) / bins;
    const counts = Array(bins).fill(0);
    arr.forEach(v => {
      let i = Math.floor((v - min) / width);
      if (i >= bins) i = bins - 1;
      counts[i]++;
    });
    const labels = Array.from({ length: bins }, (_, i) =>
      (min + i * width + width / 2).toFixed(1)
    );
    return { counts, labels, min, max, width };
  },
  // KDE for smooth density
  kde(arr, bandwidth, steps = 200) {
    const min = Math.min(...arr) - bandwidth * 2;
    const max = Math.max(...arr) + bandwidth * 2;
    const xs = Array.from({ length: steps }, (_, i) => min + (i / (steps - 1)) * (max - min));
    const ys = xs.map(x =>
      arr.reduce((s, v) => s + Math.exp(-0.5 * ((x - v) / bandwidth) ** 2), 0) /
      (arr.length * bandwidth * Math.sqrt(2 * Math.PI))
    );
    return { xs, ys };
  },
  // Normal PDF
  normalPDF(x, mu = 0, sigma = 1) {
    return Math.exp(-0.5 * ((x - mu) / sigma) ** 2) / (sigma * Math.sqrt(2 * Math.PI));
  },
  // Normal CDF (approximation)
  normalCDF(x) {
    const t = 1 / (1 + 0.2316419 * Math.abs(x));
    const d = 0.3989423 * Math.exp(-x * x / 2);
    const p = d * t * (0.3193815 + t * (-0.3565638 + t * (1.7814779 + t * (-1.8212560 + t * 1.3302744))));
    return x > 0 ? 1 - p : p;
  },
  // t-distribution CDF (approximation via regularized incomplete beta)
  tCDF(t, df) {
    const x = df / (df + t * t);
    return 0.5 * Stats.incompleteBeta(df / 2, 0.5, x);
  },
  // F-distribution CDF (approximation)
  fCDF(f, d1, d2) {
    const x = d2 / (d2 + d1 * f);
    return Stats.incompleteBeta(d2 / 2, d1 / 2, x);
  },
  // Chi-squared CDF
  chi2CDF(x, k) {
    if (x <= 0) return 0;
    return Stats.regularizedGamma(k / 2, x / 2);
  },
  // Regularized lower incomplete gamma (series expansion)
  regularizedGamma(a, x, maxIter = 200) {
    if (x < 0) return 0;
    if (x === 0) return 0;
    let sum = 1 / a, term = 1 / a;
    for (let n = 1; n < maxIter; n++) {
      term *= x / (a + n);
      sum += term;
      if (Math.abs(term) < 1e-10 * Math.abs(sum)) break;
    }
    return Math.min(1, sum * Math.exp(-x + a * Math.log(x) - Stats.logGamma(a)));
  },
  // Log gamma (Stirling approximation)
  logGamma(z) {
    if (z < 0.5) return Math.log(Math.PI / Math.sin(Math.PI * z)) - Stats.logGamma(1 - z);
    z -= 1;
    const c = [76.18009172947146, -86.50532032941677, 24.01409824083091,
      -1.231739572450155, 0.1208650973866179e-2, -0.5395239384953e-5];
    let x = 0.99999999999999307;
    c.forEach((ci, i) => x += ci / (z + i + 1));
    return 0.5 * Math.log(2 * Math.PI) + (z + 0.5) * Math.log(z + 5.5) - (z + 5.5) + Math.log(x);
  },
  // Regularized incomplete beta function
  incompleteBeta(a, b, x, maxIter = 200) {
    if (x <= 0) return 0;
    if (x >= 1) return 1;
    const lbeta = Stats.logGamma(a) + Stats.logGamma(b) - Stats.logGamma(a + b);
    const front = Math.exp(Math.log(x) * a + Math.log(1 - x) * b - lbeta) / a;
    // Continued fraction
    let f = 1, C = 1, D = 1 - (a + b) * x / (a + 1);
    if (Math.abs(D) < 1e-30) D = 1e-30;
    D = 1 / D; f = D;
    for (let m = 1; m <= maxIter; m++) {
      let d = m * (b - m) * x / ((a + 2 * m - 1) * (a + 2 * m));
      D = 1 + d * D; if (Math.abs(D) < 1e-30) D = 1e-30;
      C = 1 + d / C; if (Math.abs(C) < 1e-30) C = 1e-30;
      D = 1 / D; f *= C * D;
      d = -(a + m) * (a + b + m) * x / ((a + 2 * m) * (a + 2 * m + 1));
      D = 1 + d * D; if (Math.abs(D) < 1e-30) D = 1e-30;
      C = 1 + d / C; if (Math.abs(C) < 1e-30) C = 1e-30;
      D = 1 / D; const delta = C * D; f *= delta;
      if (Math.abs(delta - 1) < 1e-10) break;
    }
    const result = front * f;
    return x < (a + 1) / (a + b + 2) ? result : 1 - Stats.incompleteBeta(b, a, 1 - x);
  },
  // Tukey HSD post-hoc (returns pairwise differences)
  tukeyHSD(groups, labels) {
    const { MSW, dfW } = Stats.anova(groups);
    const results = [];
    for (let i = 0; i < groups.length; i++) {
      for (let j = i + 1; j < groups.length; j++) {
        const diff = Math.abs(Stats.mean(groups[i]) - Stats.mean(groups[j]));
        const se = Math.sqrt(MSW * (1 / groups[i].length + 1 / groups[j].length) / 2);
        const q = diff / se;
        results.push({ i, j, label: `${labels[i]} vs ${labels[j]}`, diff, q });
      }
    }
    return results;
  },
  // Confusion matrix metrics
  confusionMetrics(tp, fp, fn, tn) {
    const total = tp + fp + fn + tn;
    const accuracy = total > 0 ? (tp + tn) / total : 0;
    const precision = (tp + fp) > 0 ? tp / (tp + fp) : 0;
    const recall = (tp + fn) > 0 ? tp / (tp + fn) : 0;
    const f1 = (precision + recall) > 0 ? 2 * precision * recall / (precision + recall) : 0;
    const specificity = (tn + fp) > 0 ? tn / (tn + fp) : 0;
    return { accuracy, precision, recall, f1, specificity, tp, fp, fn, tn };
  },
  format: {
    p(p) {
      if (p < 0.001) return 'p < 0.001';
      if (p < 0.01) return `p = ${p.toFixed(3)}`;
      return `p = ${p.toFixed(3)}`;
    },
    num(v, dec = 3) { return Number(v).toFixed(dec); },
    pct(v) { return (v * 100).toFixed(1) + '%'; },
    sig(p) { return p < 0.05 ? '✓ Significant' : '✗ Not significant'; }
  }
};

// ─── Chart Factory ────────────────────────────────────────────────────────────
// Thin wrapper — creates/updates Chart.js instances and destroys old ones cleanly

const _charts = new Map();

function getChart(canvasId) { return _charts.get(canvasId); }

function makeChart(canvasId, config) {
  if (_charts.has(canvasId)) {
    _charts.get(canvasId).destroy();
    _charts.delete(canvasId);
  }
  const canvas = document.getElementById(canvasId);
  if (!canvas) return null;
  const ctx = canvas.getContext('2d');
  const chart = new Chart(ctx, config);
  _charts.set(canvasId, chart);
  return chart;
}

function destroyChart(canvasId) {
  if (_charts.has(canvasId)) {
    _charts.get(canvasId).destroy();
    _charts.delete(canvasId);
  }
}

  coral:     '#D85A30',
  amber:     '#E8A838',
  alpha(hex, a) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r},${g},${b},${a})`;

};

// ─── Control renderer ─────────────────────────────────────────────────────────
// Renders declarative control specs from module.controls[] into the controls panel
// Returns a live params object; calls onChange(params) on every change

function renderControls(container, controls, onChange) {
  container.innerHTML = '';
  const params = {};
  controls.forEach(spec => {
    params[spec.id] = spec.default;
    const wrap = document.createElement('div');
    wrap.className = 'control-group';
    if (spec.type === 'slider') {
      wrap.innerHTML = `
        <div class="control-label">
          <span>${spec.label}</span>
          <span class="control-value" id="val-${spec.id}">${spec.default}${spec.unit || ''}</span>
        </div>
        <input type="range" id="ctrl-${spec.id}" min="${spec.min}" max="${spec.max}"
          step="${spec.step || 1}" value="${spec.default}" class="ctrl-slider">`;
      container.appendChild(wrap);
      const input = wrap.querySelector(`#ctrl-${spec.id}`);
      const valEl = wrap.querySelector(`#val-${spec.id}`);
      input.addEventListener('input', () => {
        params[spec.id] = +input.value;
        valEl.textContent = input.value + (spec.unit || '');
        onChange({ ...params });
      });
    } else if (spec.type === 'select') {
      const opts = spec.options.map(o =>
        `<option value="${o.value}" ${o.value === spec.default ? 'selected' : ''}>${o.label}</option>`
      ).join('');
      wrap.innerHTML = `
        <div class="control-label"><span>${spec.label}</span></div>
        <select id="ctrl-${spec.id}" class="ctrl-select">${opts}</select>`;
      container.appendChild(wrap);
      const sel = wrap.querySelector(`#ctrl-${spec.id}`);
      sel.addEventListener('change', () => {
        params[spec.id] = sel.value;
        onChange({ ...params });
      });
    } else if (spec.type === 'toggle') {
      wrap.innerHTML = `
        <label class="ctrl-toggle-wrap">
          <input type="checkbox" id="ctrl-${spec.id}" ${spec.default ? 'checked' : ''} class="ctrl-toggle-input">
          <span class="ctrl-toggle-track"><span class="ctrl-toggle-thumb"></span></span>
          <span class="ctrl-toggle-label">${spec.label}</span>
        </label>`;
      container.appendChild(wrap);
      const input = wrap.querySelector(`#ctrl-${spec.id}`);
      input.addEventListener('change', () => {
        params[spec.id] = input.checked;
        onChange({ ...params });
      });
    } else if (spec.type === 'radio') {
      const btns = spec.options.map(o =>
        `<button class="ctrl-radio-btn ${o.value === spec.default ? 'active' : ''}"
          data-value="${o.value}">${o.label}</button>`
      ).join('');
      wrap.innerHTML = `
        <div class="control-label"><span>${spec.label}</span></div>
        <div class="ctrl-radio-group" id="ctrl-${spec.id}">${btns}</div>`;
      container.appendChild(wrap);
      const grp = wrap.querySelector(`#ctrl-${spec.id}`);
      grp.addEventListener('click', e => {
        const btn = e.target.closest('.ctrl-radio-btn');
        if (!btn) return;
        grp.querySelectorAll('.ctrl-radio-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        params[spec.id] = btn.dataset.value;
        onChange({ ...params });
      });
    }
  });
  return params;
}

// ─── Debounce ────────────────────────────────────────────────────────────────
function debounce(fn, ms = 150) {
  let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

// ── global exposure ──
window._engine = {
  Stats: Stats,
  getChart: getChart,
  makeChart: makeChart,
  destroyChart: destroyChart,
  COLORS: COLORS,
  renderControls: renderControls,
  debounce: debounce
};

            data: [{ x: params.mu0, y: 0 }, { x: params.mu0, y: maxY }],
            type: 'line', borderColor: window._engine.COLORS.primary, borderWidth: 1.5, borderDash: [5, 5],
            pointRadius: 0, fill: false,
          }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: true,
        plugins: {
          legend: { labels: { font: { size: 11 } } },
          title: { display: true, text: `Z = ${z.toFixed(3)}  |  ${window._engine.Stats.format.p(p)}  |  n = ${n}  |  SE = ${se.toFixed(3)}`, font: { size: 12 } }
        },
        scales: {
          x: { type: 'linear', title: { display: true, text: 'Sample mean hours/week' }, ticks: { maxTicksLimit: 8 } },
          y: { display: false }
        }
      }
    });

    // Population histogram
    const histData = data.hoursPerWeek.histogram;
    window._engine.makeChart('zt-hist', {
      type: 'bar',
      data: {
        labels: histData.map(b => b.bin),
        datasets: [{
          label: 'Population frequency', data: histData.map(b => b.count),
          backgroundColor: window._engine.COLORS.alpha(window._engine.COLORS.primary, 0.5), borderWidth: 0
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: true,
        plugins: {
          legend: { display: false },
          title: { display: true, text: 'Population: Hours worked per week (n = 48,842)', font: { size: 11 } }
        },
        scales: { x: { title: { display: true, text: 'Hours/week' } }, y: { title: { display: true, text: 'Count' } } }
      }
    });
  },
  explain(params, data) {
    if (!data) return '';
    const mu = data.hoursPerWeek.mean, sigma = data.hoursPerWeek.std, n = params.sampleN;
    const se = sigma / Math.sqrt(n);
    const z = (mu - params.mu0) / se;
    const p = 2 * (1 - window._engine.Stats.normalCDF(Math.abs(z)));
    const sig = p < params.alpha / 100;
    return `
      <div class="explain-grid">
        <div class="stat-card"><span class="stat-val">${mu.toFixed(2)}</span><span class="stat-lbl">Sample mean (x̄)</span></div>
        <div class="stat-card"><span class="stat-val">${se.toFixed(3)}</span><span class="stat-lbl">Std Error (σ/√n)</span></div>
        <div class="stat-card"><span class="stat-val">${z.toFixed(3)}</span><span class="stat-lbl">Z-statistic</span></div>
        <div class="stat-card"><span class="stat-val ${sig ? 'sig' : 'nonsig'}">${window._engine.Stats.format.p(p)}</span><span class="stat-lbl">p-value (two-tail)</span></div>
      </div>
      <p class="explain-text">Testing H₀: μ = ${params.mu0} hours/week against H₁: μ ≠ ${params.mu0}.<br>
      Z = (${mu.toFixed(2)} − ${params.mu0}) / ${se.toFixed(3)} = <strong>${z.toFixed(3)}</strong>.</p>
      <p class="explain-text">${sig ? `<strong>Reject H₀</strong>: The observed mean of ${mu.toFixed(2)} hours is significantly different from ${params.mu0} hours (${window._engine.Stats.format.p(p)}).` : `<strong>Fail to reject H₀</strong>: Insufficient evidence that the true mean differs from ${params.mu0} hours.`}
      </p>
      <p class="explain-text"><strong>Why Z-test (not t-test)?</strong> With n = 48,842, the Central Limit Theorem guarantees the sampling distribution is normal regardless of the underlying distribution. σ is treated as known. Try n = 30 — the approximation still holds due to CLT.</p>`;
  }
};

})();

</script>
<script>
// ── APP ──────────────────────────────────────────────────



// ── Register Chart.js annotation plugin ─────────────────────────────────────
if (window.Chart && window.ChartAnnotation) {
  Chart.register(window.ChartAnnotation);
}

// ── Global Chart.js defaults (dark-first) ────────────────────────────────────
function applyChartDefaults() {
  const isDark = document.documentElement.dataset.theme !== 'light';
  const textColor  = isDark ? '#9b9aab' : '#6b6a82';
  const gridColor  = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.06)';
  Chart.defaults.color               = textColor;
  Chart.defaults.borderColor         = gridColor;
  Chart.defaults.font.family         = "'DM Mono', monospace";
  Chart.defaults.font.size           = 11;
  Chart.defaults.plugins.legend.labels.color = textColor;
  Chart.defaults.plugins.title.color         = isDark ? '#f0eff4' : '#1a1928';
  Chart.defaults.scale.grid.color            = gridColor;
  Chart.defaults.scale.ticks.color           = textColor;
  Chart.defaults.animation.duration          = 300;
}
applyChartDefaults();

// ── State ────────────────────────────────────────────────────────────────────
let currentModule = null;
let currentParams = {};
let currentData   = null;

// ── Build sidebar ────────────────────────────────────────────────────────────
const sidebar = document.getElementById('sidebar');
window._CATEGORIES.forEach(cat => {
  const items = window._REGISTRY.filter(r => r.category === cat.id);
  if (!items.length) return;
  const label = document.createElement('div');
  label.className = 'sidebar-cat';
  label.textContent = cat.label;
  sidebar.appendChild(label);
  items.forEach(item => {
    const el = document.createElement('div');
    el.className  = 'nav-item';
    el.dataset.id = item.id;
    el.innerHTML  = `<span class="nav-icon">${item.icon}</span><span class="nav-label">${item.title}</span>`;
    el.addEventListener('click', () => loadTopic(item.id));
    sidebar.appendChild(el);
  });
});

// ── Build welcome grid ────────────────────────────────────────────────────────
const welcomeGrid = document.getElementById('welcome-grid');
window._REGISTRY.forEach(item => {
  const card = document.createElement('div');
  card.className = 'welcome-card';
  card.innerHTML = `<div class="welcome-card-icon">${item.icon}</div><div class="welcome-card-title">${item.title}</div>`;
  card.addEventListener('click', () => loadTopic(item.id));
  welcomeGrid.appendChild(card);
});

// ── Panel tab switching ───────────────────────────────────────────────────────
document.querySelectorAll('.panel-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel-section').forEach(s => s.classList.remove('visible'));
    tab.classList.add('active');
    document.getElementById(`tab-${tab.dataset.tab}`).classList.add('visible');
  });
});

// ── Theme toggle ─────────────────────────────────────────────────────────────
const themeBtn = document.getElementById('theme-toggle');
themeBtn.addEventListener('click', () => {
  const html = document.documentElement;
  const isDark = html.dataset.theme !== 'light';
  html.dataset.theme = isDark ? 'light' : 'dark';
  themeBtn.textContent = isDark ? '🌙 Dark' : '☀ Light';
  applyChartDefaults();
  // Re-render current module with new theme
  if (currentModule) {
    renderModule(currentModule, currentData, currentParams);
  }
});

// ── Search ────────────────────────────────────────────────────────────────────
const searchInput   = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) { searchResults.classList.remove('visible'); return; }
  const matches = window._REGISTRY.filter(r =>
    r.title.toLowerCase().includes(q) ||
    r.dataset.toLowerCase().includes(q) ||
    r.category.toLowerCase().includes(q)
  );
  if (!matches.length) { searchResults.classList.remove('visible'); return; }
  searchResults.innerHTML = matches.map(r => `
    <div class="search-result-item" data-id="${r.id}">
      <span class="sr-icon">${r.icon}</span>
      <div>
        <div class="sr-title">${r.title}</div>
        <div class="sr-dataset">${r.dataset}</div>
      </div>
    </div>`).join('');
  searchResults.classList.add('visible');
});

searchResults.addEventListener('click', e => {
  const item = e.target.closest('.search-result-item');
  if (!item) return;
  loadTopic(item.dataset.id);
  searchResults.classList.remove('visible');
  searchInput.value = '';
});

document.addEventListener('click', e => {
  if (!searchResults.contains(e.target) && e.target !== searchInput)
    searchResults.classList.remove('visible');
});

// ── Module loader ─────────────────────────────────────────────────────────────
async function loadTopic(id) {
  // Update nav
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });

  // Show topic view, hide welcome
  document.getElementById('welcome').style.display    = 'none';
  document.getElementById('topic-view').style.display = 'block';

  // Show loading state
  const chartArea = document.getElementById('chart-area');
  chartArea.innerHTML = `<div class="chart-loading"><div class="spinner"></div><span>Loading ${id}…</span></div>`;

  const reg = window._REGISTRY.find(r => r.id === id);

  // Update header
  document.getElementById('topic-title').textContent  = reg.title;
  document.getElementById('topic-insight').textContent = '';
  document.getElementById('topic-meta').innerHTML      = '';

  try {
    // Dynamically import the module
    const mod = await Promise.resolve({ default: window._modules[reg.id] });
    const m   = mod.default;

    currentModule = m;
    currentData   = m.data;

    // Update header metadata
    document.getElementById('topic-insight').textContent = m.meta.insight || '';
    document.getElementById('topic-meta').innerHTML = `
      <span class="meta-chip cat-${m.meta.category}">${reg.categoryLabel}</span>
      <span class="meta-chip">dataset: ${m.meta.dataset}</span>`;

    // Render controls
    const ctrlContainer = document.getElementById('tab-controls');
    currentParams = window._engine.renderControls(ctrlContainer, m.controls || [], window._engine.debounce(params => {
      currentParams = params;
      renderModule(m, currentData, currentParams);
      updateExplain(m, currentData, currentParams);
    }, 120));

    // Add dataset badge
    ctrlContainer.insertAdjacentHTML('beforeend', `
      <div class="dataset-badge">
        <div class="dataset-badge-title">Dataset</div>
        <div class="dataset-badge-name">${m.meta.dataset}</div>
      </div>`);

    // Initial render
    renderModule(m, currentData, currentParams);
    updateExplain(m, currentData, currentParams);

    // Switch to controls tab
    document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel-section').forEach(s => s.classList.remove('visible'));
    document.querySelector('[data-tab="controls"]').classList.add('active');
    document.getElementById('tab-controls').classList.add('visible');

  } catch (err) {
    console.error('Failed to load module:', id, err);
    chartArea.innerHTML = `
      <div class="chart-loading" style="color:var(--accent-coral)">
        <span>⚠ Failed to load module: ${err.message}</span>
      </div>`;
  }
}

function renderModule(m, data, params) {
  const chartArea = document.getElementById('chart-area');
  chartArea.innerHTML = '';
  try {
    m.render(chartArea, data, params);
  } catch (err) {
    console.error('Render error:', err);
    chartArea.innerHTML = `<div class="chart-loading" style="color:var(--accent-coral)">⚠ Render error: ${err.message}</div>`;
  }
}

function updateExplain(m, data, params) {
  const el = document.getElementById('tab-explain');
  try {
    el.innerHTML = m.explain ? m.explain(params, data) : '<p class="explain-text">No explanation available.</p>';
  } catch(err) {
    el.innerHTML = `<p class="explain-text" style="color:var(--accent-coral)">Explain error: ${err.message}</p>`;
  }
}

// ── URL hash routing ──────────────────────────────────────────────────────────
function routeFromHash() {
  const hash = location.hash.slice(1);
  if (hash && window._REGISTRY.find(r => r.id === hash)) loadTopic(hash);
}
window.addEventListener('hashchange', routeFromHash);
routeFromHash();

// ── Keyboard shortcut: / to focus search ─────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
  }
  if (e.key === 'Escape') {
    searchResults.classList.remove('visible');
    searchInput.blur();
  }
});

</script>
</body>
</html>
